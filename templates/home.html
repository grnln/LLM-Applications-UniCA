{% extends 'base.html' %}

{% block title %}
    Oscar RAG
{% endblock %}

{% block content %}
    <div class="d-flex flex-row align-items-bottom justify-content-center">
        <div id="chat" class="container d-flex flex-column py-3" style="max-height: 78vh; overflow-y: auto;"></div>

        <div class="d-flex flex-column align-items-center fixed-bottom p-3 bg-secondary" style="height: 22vh;">
            <div class="d-flex flex-row gap-3 mb-2 text-white">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="mode" id="mode-graph" value="graph" checked>
                    <label class="form-check-label" for="mode-graph">Graph RAG</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="mode" id="mode-text" value="text">
                    <label class="form-check-label" for="mode-text">Text RAG</label>
                </div>
            </div>
            <div class="d-flex flex-row justify-content-center w-100 gap-2">
                <textarea id="prompt-input" class="form-control" rows="2"
                          style="resize: none; max-width: 800px;"
                          placeholder="Ask a question (Ctrl/Cmd+Enter to send)"></textarea>
                <button id="prompt-btn" class="btn btn-primary">Prompt!</button>
            </div>
        </div>
    </div>
    <script type="text/javascript" src="{{ url_for('static', filename='js/home.js') }}"></script>
{% endblock %}
